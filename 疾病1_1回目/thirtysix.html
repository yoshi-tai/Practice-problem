<!DOCTYPE html>

<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="36"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  意識レベルを評価するのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>クレペリンテスト</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>フェイススケール</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>ロールシャッハテスト</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>グラスゴー・コーマ・スケール</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>4</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>グラスゴー・コーマ・スケール：意識レベルの評価に用いられる。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: クレペリンテスト：作業能力や計算能力の評価。</li><li><strong>opt2</strong>: フェイススケール：痛みの評価。</li><li><strong>opt3</strong>: ロールシャッハテスト：心理検査、投影法。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>
