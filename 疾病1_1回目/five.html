<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 5</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="5"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  創傷治癒について、一次治癒と比較した二次治癒の特徴はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>瘢痕を形成する。</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>組織欠損が少ない。</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>肉芽組織量は少ない。</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>組織修復は速やかである。</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>1</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>瘢痕を形成する。→ 正しい。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt2</strong>: 組織欠損が少ない。→ 二次治癒では組織欠損が多い。</li><li><strong>opt3</strong>: 肉芽組織量は少ない。→ 二次治癒では肉芽組織量が多い。</li><li><strong>opt4</strong>: 組織修復は速やかである。→ 二次治癒では修復は遅延しやすい。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
