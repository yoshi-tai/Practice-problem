<!DOCTYPE html>

<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="52"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  遺伝病はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>川崎病</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>血友病</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>B型肝炎</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>マラリア</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>サルコイドーシス</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>血友病：X染色体上の遺伝子異常による遺伝病。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 川崎病：原因不明で、遺伝病ではない。</li><li><strong>opt3</strong>: B型肝炎：ウイルス感染症。</li><li><strong>opt4</strong>: マラリア：寄生虫感染症。</li><li><strong>opt5</strong>: サルコイドーシス：原因不明の炎症性疾患。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>
