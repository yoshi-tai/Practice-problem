<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 24</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="24"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  鮮紅色の下血が見られた時の出血部位で正しいのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>胃</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>食道</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>直腸</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>十二指腸</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>3</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>直腸：鮮紅色の下血となりやすい。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 胃：タール便、暗赤色便、コーヒー残渣様吐物などになりやすい。</li><li><strong>opt2</strong>: 食道：吐血やタール便などになりやすい。</li><li><strong>opt4</strong>: 十二指腸：タール便となりやすい。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
