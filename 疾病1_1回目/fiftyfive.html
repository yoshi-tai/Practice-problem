<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 55</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="55"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  胎児期に感染することで先天性奇形を生じるのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>MRSA</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>結核菌</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>風疹ウイルス</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>B型肝炎ウイルス</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>ヘリコバクター・ピロリ菌</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>3</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>風疹ウイルス：妊娠初期に感染すると、先天性風疹症候群による先天性奇形を引き起こす。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: MRSA：胎児奇形は通常起こさない。</li><li><strong>opt2</strong>: 結核菌：胎児奇形は通常起こさない。</li><li><strong>opt4</strong>: B型肝炎ウイルス：母子感染はあるが、奇形は通常起こさない。</li><li><strong>opt5</strong>: ヘリコバクター・ピロリ菌：胎児奇形は通常起こさない。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
