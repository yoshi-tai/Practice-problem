<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 51</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="51"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  遺伝性疾患において男児に発症頻度の高い遺伝形式はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>伴性劣性遺伝</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>伴性優性遺伝</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>常染色体劣性遺伝</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>常染色体優性遺伝</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>1</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>伴性劣性遺伝：X染色体上の劣性遺伝子が原因。男児に発症しやすい。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt2</strong>: 伴性優性遺伝：男女とも発症の可能性がある。</li><li><strong>opt3</strong>: 常染色体劣性遺伝：男女同じ頻度で発症する。</li><li><strong>opt4</strong>: 常染色体優性遺伝：男女同じ頻度で発症する。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
