<!DOCTYPE html>
<html lang="ja">
<head>

<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="6"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  急性炎症と比較して慢性炎症に特徴的な所見はどれか。2つ選べ。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>好中球浸潤</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>CRPの上昇</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>リンパ球浸潤</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>形質細胞の浸潤</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>血管透過性の亢進</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>3, 4</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>リンパ球浸潤：慢性炎症で特徴的。<br/>形質細胞の浸潤：慢性炎症で特徴的。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 好中球浸潤：急性炎症で特徴的。</li><li><strong>opt2</strong>: CRPの上昇：急性期にも慢性期にもみられる。</li><li><strong>opt5</strong>: 血管透過性の亢進：急性炎症で特徴的。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>
