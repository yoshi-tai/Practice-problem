<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 45</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="45"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  良性腫瘍はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>扁平上皮癌</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>平滑筋肉腫</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>神経線維腫</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>骨髄腫</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>腺癌</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>3</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>神経線維腫：良性腫瘍。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 扁平上皮癌：悪性上皮性腫瘍。末尾が「癌」。</li><li><strong>opt2</strong>: 平滑筋肉腫：悪性非上皮性腫瘍。末尾が「肉腫」。</li><li><strong>opt4</strong>: 骨髄腫：形質細胞の悪性腫瘍。</li><li><strong>opt5</strong>: 腺癌：悪性上皮性腫瘍。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
