<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 15</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="15"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  貧血を診断する際の指標となる血液検査項目はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>アルブミン〈Alb〉</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>ヘモグロビン〈Hb〉</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>フィブリノゲン</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>プロトロンビン時間〈PT〉</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>ヘモグロビン〈Hb〉：貧血の診断指標。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: アルブミン〈Alb〉：栄養状態や肝機能の指標。</li><li><strong>opt3</strong>: フィブリノゲン：血液凝固に関する検査。</li><li><strong>opt4</strong>: プロトロンビン時間〈PT〉：凝固異常の検査。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
