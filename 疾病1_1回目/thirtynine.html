<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 39</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="39"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  脳死の判定基準に含まれるのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>徐脈</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>除脳硬直</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>平坦脳波</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>けいれん</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>3</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>平坦脳波：脳死判定の重要項目。刺激を加えても最低4導出で30分以上平坦であることを確認する。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 徐脈：脳死判定基準には含まれない。</li><li><strong>opt2</strong>: 除脳硬直：脳死判定基準には含まれない。</li><li><strong>opt4</strong>: けいれん：脳死では通常みられない。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
