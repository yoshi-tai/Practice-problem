<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 16</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="16"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  浮腫の原因となるのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>血漿膠質浸透圧の上昇</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>リンパ還流の不全</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>毛細血管内圧の低下</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>毛細血管透過性の低下</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>リンパ還流の不全：浮腫の原因となる。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 血漿膠質浸透圧の上昇：低下すると浮腫が起こる。</li><li><strong>opt3</strong>: 毛細血管内圧の低下：上昇すると浮腫が起こる。</li><li><strong>opt4</strong>: 毛細血管透過性の低下：亢進すると浮腫が起こる。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
