<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 34</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="34"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  血液濃度が上昇すると黄疸になるのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>グルコース</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>ビリルビン</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>中性脂肪</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>クレアチニン</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>ビリルビン：血中濃度が上昇すると皮膚や粘膜が黄染し、黄疸となる。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: グルコース：高血糖で黄疸は起こらない。</li><li><strong>opt3</strong>: 中性脂肪：血中濃度上昇で黄疸は起こらない。</li><li><strong>opt4</strong>: クレアチニン：腎機能の指標であり、黄疸とは直接関係しない。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
