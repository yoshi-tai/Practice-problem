<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="49"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  肝臓よりも肺に転移しやすい悪性腫瘍はどれか。2つ選べ。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>胃癌</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>食道癌</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>腎癌</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>結腸癌</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>膵臓癌</li><li><input type="checkbox" name="checkbox" id="opt6" value="opt6"/>十二指腸乳頭部癌</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2, 3</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>食道癌：肺転移が比較的多い。<br/>腎癌：肺転移が多い。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 胃癌：肝転移が多い。</li><li><strong>opt4</strong>: 結腸癌：肝転移が多い。</li><li><strong>opt5</strong>: 膵臓癌：肝転移が多い。</li><li><strong>opt6</strong>: 十二指腸乳頭部癌：肝転移が多い。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>
