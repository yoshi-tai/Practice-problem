<div class="box">
  全身性浮腫で起こる変化はどれか。
</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>食欲亢進</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>体重増加</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>色素沈着</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>眼球突出</li>
</ol>

<br/>

  <details>
    <summary>【答え】</summary>
    <div>2</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>体重増加：水分貯留により増加する。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 食欲亢進：浮腫とは直接関係しない。</li><li><strong>opt3</strong>: 色素沈着：浮腫とは直接関係しない。</li><li><strong>opt4</strong>: 眼球突出：甲状腺機能亢進症でみられることがある。</li></ul></div>
  </details>

  <br />
