<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="38"></span>

</div>

<div class="box">
  死の三徴候に基づいて観察するのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>腹壁反射</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>輻輳反射</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>対光反射</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>深部腱反射</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>3</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>対光反射：瞳孔散大および対光反射の消失を確認する。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 腹壁反射：死の三徴候には含まれない。</li><li><strong>opt2</strong>: 輻輳反射：死の三徴候には含まれない。</li><li><strong>opt4</strong>: 深部腱反射：死の三徴候には含まれない。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>
