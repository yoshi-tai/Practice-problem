<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 42</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="42"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  正常細胞と比較したときの悪性腫瘍細胞の特徴はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>増殖が遅い</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>分化度は低い</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>染色体異常は少ない</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>核分裂頻度は少ない</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>核/細胞質比は小さい</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>分化度は低い。→ 正しい。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 増殖が遅い。→ 悪性腫瘍では速いことが多い。</li><li><strong>opt3</strong>: 染色体異常は少ない。→ 多い。</li><li><strong>opt4</strong>: 核分裂頻度は少ない。→ 多い。</li><li><strong>opt5</strong>: 核/細胞質比は小さい。→ 大きい。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
