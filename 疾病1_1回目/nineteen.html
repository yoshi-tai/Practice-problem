<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 19</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="19"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  胃潰瘍の患者にみられる少量の吐血の特徴はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>泡沫状</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>アルカリ性</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>アンモニア臭</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>コーヒー残渣様</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>4</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>コーヒー残渣様：胃酸で血液が変性したときの典型的所見。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 泡沫状：喀血など、気道由来の血液でみられやすい。</li><li><strong>opt2</strong>: アルカリ性：胃内容物は酸性。</li><li><strong>opt3</strong>: アンモニア臭：肝不全などでみられる口臭の特徴。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
