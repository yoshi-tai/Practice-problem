<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 41</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="41"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  良性腫瘍と比較して悪性腫瘍でみられる特徴はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>被膜がある</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>遠隔転移する</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>周囲組織に浸潤しない</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>増殖速度が緩やかである</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>遠隔転移する：悪性腫瘍の特徴。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 被膜がある：良性腫瘍の特徴。</li><li><strong>opt3</strong>: 周囲組織に浸潤しない：良性腫瘍の特徴。</li><li><strong>opt4</strong>: 増殖速度が緩やかである：良性腫瘍の特徴。悪性腫瘍は増殖が速い場合が多い。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
