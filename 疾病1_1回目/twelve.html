<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 12</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="12"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  動脈硬化に最も関連のある危険因子はどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>胆石症</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>尿管結石</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>脂質異常症</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>高尿酸血症</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>3</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>脂質異常症：動脈硬化の主要な危険因子。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 胆石症：動脈硬化とは直接関係しない。</li><li><strong>opt2</strong>: 尿管結石：動脈硬化とは直接関係しない。</li><li><strong>opt4</strong>: 高尿酸血症：関与はあるが、最も関連が強いものではない。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
