<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 35</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="35"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  黄疸を最も確認しやすいのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>眼球結膜</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>爪床</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>口唇</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>耳朶〈耳たぶ〉</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>1</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>眼球結膜：皮膚よりも黄染がわかりやすく、黄疸の早期発見に有用。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt2</strong>: 爪床：薄い黄染は見えにくい。</li><li><strong>opt3</strong>: 口唇：黄染はわかりにくい。</li><li><strong>opt4</strong>: 耳朶：黄染の確認には適さない。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
