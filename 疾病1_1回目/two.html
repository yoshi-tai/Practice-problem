<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 2</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="2"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  アポトーシスで正しいのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>群発的に発現する。</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>壊死のことである。</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>炎症反応が関与する。</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>プログラムされた細胞死である。</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>4</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>プログラムされた細胞死である。→ 正しい。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 群発的に発現する。→ 孤発的に発現する。</li><li><strong>opt2</strong>: 壊死のことである。→ 壊死ではない。</li><li><strong>opt3</strong>: 炎症反応が関与する。→ 通常、炎症反応は関与しない。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
