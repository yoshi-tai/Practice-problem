<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 48</title>

</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="48"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  前立腺癌に特徴的な腫瘍マーカーはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>AFP</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>CA19-9</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>CEA</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>PSA</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>4</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>PSA：前立腺癌に特徴的。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: AFP：肝細胞癌など。</li><li><strong>opt2</strong>: CA19-9：膵臓癌、胆管癌、胆嚢癌など。</li><li><strong>opt3</strong>: CEA：肺癌、消化器癌など。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
