<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_1回目 22</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="22"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  チアノーゼを最も観察しやすいのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>口唇</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>耳介</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>頭皮</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>眼球</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>1</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>口唇：末梢循環の状態を観察しやすく、チアノーゼを確認しやすい。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt2</strong>: 耳介：観察できるが、口唇より優先度は低い。</li><li><strong>opt3</strong>: 頭皮：観察には不向き。</li><li><strong>opt4</strong>: 眼球：チアノーゼの観察部位としては適さない。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
