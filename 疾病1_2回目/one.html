<div class="LineUp">
  問題 <span id="problemNumber" value="1"></span>

</div>

<div class="box">
  インフルエンザが流行しているが、小規模多機能型居宅介護を行う事業所では罹患者はいない。この事業所で看護師が行う罹患予防の対策で最も適切なのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>宿泊の利用を断る。</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>湿度を10%以下に保つ。</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>利用者に手洗いを勧める。</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>利用者に予防的に抗インフルエンザ薬を与薬する。</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>3</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>利用者に手洗いを勧める。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 宿泊の利用を断る。</li><li><strong>opt2</strong>: 湿度を10%以下に保つ。</li><li><strong>opt4</strong>: 利用者に予防的に抗インフルエンザ薬を与薬する。</li></ul></div>
  </details>

  <br />

</div>
