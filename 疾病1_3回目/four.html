<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="4"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  閉経について正しいのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>閉経すると膣の自浄作用が低下する。</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>閉経後はエストロゲン分泌が増加する。</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>日本人の閉経の平均年齢は55歳である。</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>10か月の連続した無月経の確認で診断される。</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>1</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>閉経すると膣の自浄作用が低下する。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt2</strong>: 閉経後はエストロゲン分泌が増加する。</li><li><strong>opt3</strong>: 日本人の閉経の平均年齢は55歳である。</li><li><strong>opt4</strong>: 10か月の連続した無月経の確認で診断される。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>
