<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_3回目 14</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="14"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  経腟超音波検査の説明で正しいのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>検査が終了するまで絶飲食する。</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>検査前に排尿するよう促す。</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>検査は側臥位で行う。</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>検査後1時間は安静にする。</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>検査前に排尿するよう促す。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 検査が終了するまで絶飲食する。</li><li><strong>opt3</strong>: 検査は側臥位で行う。</li><li><strong>opt4</strong>: 検査後1時間は安静にする。</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
