<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>疾病1_3回目 8</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../page_move/page_move.css">
</head>
<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="8"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  更年期症状があるAさんのホルモンで上昇しているのはどれか。2つ選べ。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>エストロゲン</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>プロラクチン</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>プロゲステロン</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>黄体形成ホルモン〈LH〉</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>卵胞刺激ホルモン〈FSH〉</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>4, 5</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>黄体形成ホルモン〈LH〉<br/>卵胞刺激ホルモン〈FSH〉</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: エストロゲン</li><li><strong>opt2</strong>: プロラクチン</li><li><strong>opt3</strong>: プロゲステロン</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>

<script src="shippei1.js"></script>
<script src="answer.js"></script>
<script src="../page_move/page_move.js"></script>
</body>
</html>
