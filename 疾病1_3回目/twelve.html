<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="12"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  子宮頸がんの進行期を決めるために行われる検査で適切なのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>ヒトパピローマウイルス検査</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>小腸内視鏡検査</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>腎盂尿管造影</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>脊髄造影</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>CT</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>5</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>CT</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: ヒトパピローマウイルス検査</li><li><strong>opt2</strong>: 小腸内視鏡検査</li><li><strong>opt3</strong>: 腎盂尿管造影</li><li><strong>opt4</strong>: 脊髄造影</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>
