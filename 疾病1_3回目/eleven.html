<div class="box">
  ヒトパピローマウイルス〈HPV〉検査の説明で正しいのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>子宮頸部の細胞をこすり取って検査します。</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>HPVワクチンを接種した人が対象です。</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>陽性であれば子宮頸がんと診断されます。</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>HPV抗原検査も同時に行います。</li>

<br/>

  <details>
    <summary>【答え】</summary>
    <div>1</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>子宮頸部の細胞をこすり取って検査します。</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt2</strong>: HPVワクチンを接種した人が対象です。</li><li><strong>opt3</strong>: 陽性であれば子宮頸がんと診断されます。</li><li><strong>opt4</strong>: HPV抗原検査も同時に行います。</li></ul></div>
  </details>

  <br />
