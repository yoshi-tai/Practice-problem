<html lang="ja">

<body>
<div class="LineUp">
  問題 <span id="problemNumber" value="5"></span>
  <input type="button" value="答え" onclick="showAnswer()">
</div>

<div class="box">
  感染症と保健所への届出期間の組み合わせで正しいのはどれか。
</div>

<div id="correctMark">正解！</div>

<ol>
  <li><input type="checkbox" name="checkbox" id="opt1" value="opt1"/>結核：診断後7日以内</li><li><input type="checkbox" name="checkbox" id="opt2" value="opt2"/>梅毒：診断後直ちに</li><li><input type="checkbox" name="checkbox" id="opt3" value="opt3"/>E型肝炎：診断後直ちに</li><li><input type="checkbox" name="checkbox" id="opt4" value="opt4"/>腸管出血性大腸菌感染症：診断後7日以内</li><li><input type="checkbox" name="checkbox" id="opt5" value="opt5"/>後天性免疫不全症候群〈AIDS〉：診断後直ちに</li>
</ol>

<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/>
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
    <div>2, 3, 5</div>
  </details><br/>

  <details>
    <summary>【答えの解説】</summary>
    <div>梅毒：診断後直ちに<br/>E型肝炎：診断後直ちに<br/>後天性免疫不全症候群〈AIDS〉：診断後直ちに</div>
  </details><br/>

  <details>
    <summary>【選択肢の解説】</summary>
    <div><ul><li><strong>opt1</strong>: 結核：診断後7日以内</li><li><strong>opt4</strong>: 腸管出血性大腸菌感染症：診断後7日以内</li></ul></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

<div id="pageMove"></div>
