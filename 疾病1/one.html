<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>疾病1 (１回目)</title>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  
<div class="LineUp">
  問題 <span id="problemNumber" value="1" onload="setProblemNumber()"></span>
<input type="button" value="答え" onclick="showAnswer()">
</div>

  <div class="box">
    抗体を産生するのはどれか。2つ選べ？
  </div>
 
<ol>
  <li><input type="radio" name="radio" id="1" value="opt1"/>好中球</li>
  <li><input type="radio" name="radio" id="2" value="opt2"/>好塩基球</li>
  <li><input type="radio" name="radio" id="3" value="opt3"/>形質細胞</li>
  <li><input type="radio" name="radio" id="4" value="opt4"/>好酸球</li>
  <li><input type="radio" name="radio" id="5" value="opt5"/>マクロファージ</li>
  <li><input type="radio" name="radio" id="6" value="opt6"/>リンパ球</li>
</ol>
      
<div class="button">
  <input type="button" id="one" value="戻る" onclick="goBack(this)">
  
  <input type="button" id="oneOk" value="OK" onclick="OK()">
  
  <input type="button" id="oneNext" value="次へ" onclick="goNext(this)">
</div>

<br/ >
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
      <div class="answer"></div>
  </details><br/ >

  <details>
    <summary>【解説】</summary>
      <div class="explanation"></div>
  </details><br/ >

  <details>
    <summary>【選択肢の解説】</summary>
      <div class="option-explanations"></div>
  </details>

  <br />
  <input type="button" class="close" value="とじる" onclick="closeModal()">
</div>

  <script src="shippei1.js"></script>
  <script src="answer.js"></script>
</body>
</html>
