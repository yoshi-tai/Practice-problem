<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>疾病1 (１回目)</title>

  <!-- Custom Styles -->

</head>

<body>
  
<div class="LineUp">
  問題 <span id="problemNumber" value="4"></span>
<input type="button" value="答え" onclick="showAnswer()">
</div>

  <div class="box">
    疾病の内因になるのはどれか。
  </div>
 
  <div id="correctMark">正解！</div>
  
<ol>
  <li><input type="radio" name="radio" id="1" value="opt1"/>栄養素</li>
  <li><input type="radio" name="radio" id="2" value="opt2"/>免疫複合体</li>
  <li><input type="radio" name="radio" id="3" value="opt3"/>温度</li>
  <li><input type="radio" name="radio" id="4" value="opt4"/>細菌</li>
  <li><input type="radio" name="radio" id="5" value="opt5"/>放射線</li>
</ol>
      
<div class="button">
  <input type="button" id="back" value="戻る" onclick="goBack(this)">
  <input type="button" id="answerBtn" value="OK" onclick="oK()">
  <input type="button" id="next" value="次へ" onclick="goNext(this)">
</div>

<br/ >
<div id="modal1" style="display: none;">
  <details>
    <summary>【答え】</summary>
      <div class="answer"></div>
  </details><br/ >

  <details>
    <summary>【解説】</summary>
      <div class="explanation"></div>
  </details><br/ >

  <details>
    <summary>【選択肢の解説】</summary>

  </details>

  <br />
